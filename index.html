<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>趣味测试乐园</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep: #0a0a1a;
  --bg-mid: #1a0a2e;
  --glass-bg: rgba(255, 255, 255, 0.03);
  --glass-border: rgba(255, 255, 255, 0.08);
  --glass-hover: rgba(255, 255, 255, 0.06);
  --text: #e8e6f0;
  --text-dim: #8a8aa0;
  --neon-purple: #b347ea;
  --neon-pink: #ff2d95;
  --neon-cyan: #00f0ff;
  --neon-amber: #ffb800;
  --neon-green: #39ff14;
  --glow-purple: 0 0 20px rgba(179,71,234,0.4), 0 0 40px rgba(179,71,234,0.15);
  --glow-pink: 0 0 20px rgba(255,45,149,0.4), 0 0 40px rgba(255,45,149,0.15);
  --glow-cyan: 0 0 20px rgba(0,240,255,0.4), 0 0 40px rgba(0,240,255,0.15);
  --glow-amber: 0 0 20px rgba(255,184,0,0.4), 0 0 40px rgba(255,184,0,0.15);
  --scanline-opacity: 0.03;
}

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: linear-gradient(135deg, #0a0a1a 0%, #0f0c29 30%, #1a0a2e 60%, #0a0a1a 100%);
  background-attachment: fixed;
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* === Scanline overlay === */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 0;
}

/* === Particle Canvas === */
#particleCanvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 500px;
  margin: 0 auto;
  padding: 20px 16px 40px;
  position: relative;
  z-index: 1;
}

/* === Staggered entrance === */
.stagger-in {
  opacity: 0;
  transform: translateY(24px);
  animation: fadeInUp 0.6s ease forwards;
}
.stagger-1 { animation-delay: 0.05s; }
.stagger-2 { animation-delay: 0.15s; }
.stagger-3 { animation-delay: 0.25s; }
.stagger-4 { animation-delay: 0.35s; }
.stagger-5 { animation-delay: 0.45s; }

@keyframes fadeInUp {
  to { opacity: 1; transform: translateY(0); }
}

/* === Header === */
.header {
  text-align: center;
  padding: 44px 0 36px;
  position: relative;
}
.header h1 {
  font-size: 34px;
  font-weight: 900;
  background: linear-gradient(135deg, #b347ea, #ff2d95, #00f0ff, #b347ea);
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradientShift 4s ease infinite;
  letter-spacing: 1px;
  filter: drop-shadow(0 0 18px rgba(179,71,234,0.5));
}
@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
.header .subtitle {
  color: var(--text-dim);
  font-size: 14px;
  margin-top: 10px;
  letter-spacing: 0.5px;
  opacity: 0.8;
}

/* === Glass Card Base === */
.glass-card {
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 16px;
  transition: all 0.35s ease;
  position: relative;
}
.glass-card:hover {
  background: rgba(255, 255, 255, 0.06);
  border-color: rgba(255, 255, 255, 0.14);
}

/* === User Info === */
.user-info {
  padding: 22px 20px;
  margin-bottom: 24px;
}
.user-info .section-label {
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 16px;
  font-weight: 500;
}
.user-info input[type="text"] {
  width: 100%;
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 10px;
  padding: 11px 14px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: all 0.3s;
  margin-bottom: 14px;
}
.user-info input[type="text"]:focus {
  border-color: var(--neon-purple);
  box-shadow: 0 0 0 3px rgba(179,71,234,0.1), inset 0 0 10px rgba(179,71,234,0.05);
}
.user-info .input-hint {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: -10px;
  margin-bottom: 14px;
  opacity: 0.7;
}
.user-info .birth-row {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}
.user-info .birth-row select {
  flex: 1;
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 10px;
  padding: 11px 8px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  cursor: pointer;
  transition: all 0.3s;
  appearance: none;
  -webkit-appearance: none;
  text-align: center;
}
.user-info .birth-row select:focus {
  border-color: var(--neon-pink);
  box-shadow: 0 0 0 3px rgba(255,45,149,0.1);
}
.user-info .start-btn {
  width: 100%;
  background: linear-gradient(135deg, #b347ea, #ff2d95);
  border: none;
  border-radius: 10px;
  padding: 12px;
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 0.5px;
  position: relative;
  overflow: hidden;
  transition: all 0.3s;
  box-shadow: 0 0 20px rgba(179,71,234,0.3);
}
.user-info .start-btn:hover {
  box-shadow: 0 0 30px rgba(179,71,234,0.5), 0 0 60px rgba(255,45,149,0.2);
  transform: translateY(-1px);
}
.user-info .start-btn:active { transform: scale(0.98); }
.user-info.hidden { display: none; }

/* === Quiz Grid === */
.quiz-grid {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.quiz-card {
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 16px;
  padding: 22px 20px;
  cursor: pointer;
  transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}
.quiz-card::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 16px;
  opacity: 0;
  transition: opacity 0.35s;
  pointer-events: none;
}
.quiz-card[data-quiz="personality"]::after {
  box-shadow: inset 0 0 40px rgba(179,71,234,0.15), 0 0 30px rgba(179,71,234,0.25);
}
.quiz-card[data-quiz="fortune"]::after {
  box-shadow: inset 0 0 40px rgba(255,184,0,0.15), 0 0 30px rgba(255,184,0,0.25);
}
.quiz-card[data-quiz="brainstorm"]::after {
  box-shadow: inset 0 0 40px rgba(0,240,255,0.15), 0 0 30px rgba(0,240,255,0.25);
}
.quiz-card:hover { transform: translateY(-3px); }
.quiz-card:hover::after { opacity: 1; }
.quiz-card:hover .quiz-card-top-bar { opacity: 1; }

.quiz-card-top-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  border-radius: 3px 3px 0 0;
  opacity: 0.6;
  transition: opacity 0.35s;
}
.quiz-card[data-quiz="personality"] .quiz-card-top-bar {
  background: linear-gradient(90deg, #b347ea, #ff2d95);
}
.quiz-card[data-quiz="fortune"] .quiz-card-top-bar {
  background: linear-gradient(90deg, #ffb800, #ff6b35);
}
.quiz-card[data-quiz="brainstorm"] .quiz-card-top-bar {
  background: linear-gradient(90deg, #00f0ff, #39ff14);
}

.quiz-card .emoji {
  font-size: 36px;
  margin-bottom: 12px;
  display: block;
  text-shadow: 0 0 20px rgba(255,255,255,0.1);
}
.quiz-card h3 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 6px;
  letter-spacing: 0.3px;
}
.quiz-card p {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.5;
}
.quiz-card .tag {
  display: inline-block;
  font-size: 11px;
  padding: 4px 12px;
  border-radius: 20px;
  margin-top: 10px;
  font-weight: 500;
  letter-spacing: 0.3px;
}
.quiz-card[data-quiz="personality"] .tag { background: rgba(179,71,234,0.15); color: var(--neon-purple); }
.quiz-card[data-quiz="fortune"] .tag { background: rgba(255,184,0,0.15); color: var(--neon-amber); }
.quiz-card[data-quiz="brainstorm"] .tag { background: rgba(0,240,255,0.15); color: var(--neon-cyan); }

.quiz-card:active { transform: scale(0.98); }

/* === Quiz Flow === */
.quiz-flow { display: none; }
.quiz-flow.active { display: block; animation: fadeInUp 0.4s ease; }
.quiz-grid.hidden { display: none; }

.back-btn {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  color: var(--text-dim);
  font-size: 13px;
  cursor: pointer;
  padding: 8px 16px;
  margin-bottom: 18px;
  font-family: inherit;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  transition: all 0.3s;
  letter-spacing: 0.5px;
}
.back-btn:hover {
  color: var(--text);
  border-color: rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.08);
  box-shadow: 0 0 15px rgba(255,255,255,0.05);
}

.quiz-title {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}
.quiz-progress {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 20px;
  letter-spacing: 0.5px;
}

/* === Neon Progress Bar === */
.progress-bar {
  height: 4px;
  background: rgba(255, 255, 255, 0.06);
  border-radius: 4px;
  margin-bottom: 28px;
  overflow: visible;
  position: relative;
}
.progress-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}
.progress-fill::after {
  content: '';
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 0 6px currentColor, 0 0 12px currentColor;
}
.progress-fill.personality {
  background: linear-gradient(90deg, #b347ea, #ff2d95);
  box-shadow: 0 0 10px rgba(179,71,234,0.5), 0 0 20px rgba(255,45,149,0.3);
}
.progress-fill.fortune {
  background: linear-gradient(90deg, #ffb800, #ff6b35);
  box-shadow: 0 0 10px rgba(255,184,0,0.5), 0 0 20px rgba(255,107,53,0.3);
}
.progress-fill.brainstorm {
  background: linear-gradient(90deg, #00f0ff, #39ff14);
  box-shadow: 0 0 10px rgba(0,240,255,0.5), 0 0 20px rgba(57,255,20,0.3);
}

/* === Question === */
.question-text {
  font-size: 18px;
  font-weight: 500;
  line-height: 1.7;
  margin-bottom: 24px;
  min-height: 60px;
  letter-spacing: 0.3px;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.option-btn {
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 12px;
  padding: 15px 18px;
  color: var(--text);
  font-size: 15px;
  text-align: left;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  font-family: inherit;
  line-height: 1.4;
  position: relative;
}
.option-btn:hover {
  background: rgba(255, 255, 255, 0.08);
  border-color: rgba(179,71,234,0.4);
  box-shadow: 0 0 20px rgba(179,71,234,0.1);
  transform: translateX(3px);
}
.option-btn:active {
  transform: scale(0.98);
}
.option-btn.bounce-select {
  animation: bounceSelect 0.45s ease;
}
@keyframes bounceSelect {
  0% { transform: scale(1); }
  25% { transform: scale(1.04); border-color: var(--neon-cyan); box-shadow: var(--glow-cyan); }
  50% { transform: scale(0.96); }
  75% { transform: scale(1.02); }
  100% { transform: scale(1); }
}

/* === Loading - Neon Pulse === */
.loading {
  text-align: center;
  padding: 50px 0;
}
.loading-ring {
  width: 56px;
  height: 56px;
  margin: 0 auto 24px;
  position: relative;
}
.loading-ring::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.1);
  animation: ringPulse 1.5s ease-in-out infinite;
}
.loading-ring::after {
  content: '';
  position: absolute;
  inset: 8px;
  border-radius: 50%;
  border: 2px solid transparent;
  border-top-color: var(--neon-purple);
  border-right-color: var(--neon-pink);
  animation: ringSpin 1s linear infinite;
}
.loading-ring .ring-core {
  position: absolute;
  inset: 18px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(179,71,234,0.6), rgba(255,45,149,0.3));
  animation: corePulse 1.5s ease-in-out infinite;
  box-shadow: 0 0 15px rgba(179,71,234,0.5);
}

@keyframes ringPulse {
  0%, 100% { transform: scale(1); opacity: 0.3; }
  50% { transform: scale(1.2); opacity: 0.8; }
}
@keyframes ringSpin { to { transform: rotate(360deg); } }
@keyframes corePulse {
  0%, 100% { transform: scale(0.8); opacity: 0.6; }
  50% { transform: scale(1.2); opacity: 1; }
}

.loading p {
  color: var(--text-dim);
  font-size: 14px;
  letter-spacing: 0.5px;
  animation: textFlicker 2s ease-in-out infinite;
}
@keyframes textFlicker {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}
.loading .loading-sub {
  font-size: 12px;
  margin-top: 8px;
  color: var(--text-dim);
  opacity: 0.5;
}

/* === Result Card === */
.result-card {
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 20px;
  padding: 30px 24px;
  text-align: center;
  animation: fadeInUp 0.5s ease;
  position: relative;
  overflow: hidden;
}
.result-card.personality {
  box-shadow: inset 0 0 60px rgba(179,71,234,0.05), 0 0 40px rgba(179,71,234,0.15);
}
.result-card.fortune {
  box-shadow: inset 0 0 60px rgba(255,184,0,0.05), 0 0 40px rgba(255,184,0,0.15);
}
.result-card.brainstorm {
  box-shadow: inset 0 0 60px rgba(0,240,255,0.05), 0 0 40px rgba(0,240,255,0.15);
}

.result-card .result-user {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 10px;
  letter-spacing: 0.5px;
}
.result-card .result-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: var(--text-dim);
  margin-bottom: 14px;
}
.result-card .result-title {
  font-size: 28px;
  font-weight: 900;
  margin-bottom: 20px;
  line-height: 1.3;
  animation: breatheGlow 2.5s ease-in-out infinite;
}
.result-card.personality .result-title {
  background: linear-gradient(135deg, #b347ea, #ff2d95);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 12px rgba(179,71,234,0.5));
}
.result-card.fortune .result-title {
  background: linear-gradient(135deg, #ffb800, #ff6b35);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 12px rgba(255,184,0,0.5));
}
.result-card.brainstorm .result-title {
  background: linear-gradient(135deg, #00f0ff, #39ff14);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 12px rgba(0,240,255,0.5));
}

@keyframes breatheGlow {
  0%, 100% { filter: drop-shadow(0 0 8px currentColor); }
  50% { filter: drop-shadow(0 0 24px currentColor) drop-shadow(0 0 40px currentColor); }
}

.result-card .result-body {
  font-size: 15px;
  line-height: 1.9;
  color: var(--text);
  text-align: left;
  margin-bottom: 28px;
  white-space: pre-line;
  letter-spacing: 0.3px;
}

.result-actions {
  display: flex;
  gap: 10px;
}
.result-actions button {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  border: none;
  transition: all 0.3s;
  letter-spacing: 0.3px;
}
.btn-retry {
  background: rgba(255,255,255,0.06);
  color: var(--text);
  border: 1px solid rgba(255,255,255,0.1) !important;
  backdrop-filter: blur(10px);
}
.btn-retry:hover {
  background: rgba(255,255,255,0.12);
  box-shadow: 0 0 20px rgba(255,255,255,0.05);
}
.btn-share {
  background: linear-gradient(135deg, #b347ea, #ff2d95);
  color: #fff;
  box-shadow: 0 0 20px rgba(179,71,234,0.3);
}
.btn-share:hover {
  box-shadow: 0 0 30px rgba(179,71,234,0.5), 0 0 50px rgba(255,45,149,0.2);
  transform: translateY(-1px);
}
.result-actions button:active { transform: scale(0.97); }

/* === Toast === */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(20, 10, 40, 0.9);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.12);
  padding: 12px 28px;
  border-radius: 12px;
  font-size: 14px;
  color: var(--text);
  z-index: 100;
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none;
  box-shadow: 0 0 30px rgba(179,71,234,0.15);
  letter-spacing: 0.3px;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* === Error === */
.error-msg {
  background: rgba(255,45,149,0.08);
  border: 1px solid rgba(255,45,149,0.2);
  border-radius: 12px;
  padding: 14px 18px;
  color: #ff6b8a;
  font-size: 14px;
  line-height: 1.5;
  margin-bottom: 16px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

/* === Responsive === */
@media (max-width: 420px) {
  .container { padding: 12px 12px 32px; }
  .header { padding: 30px 0 24px; }
  .header h1 { font-size: 26px; }
  .quiz-card { padding: 18px 16px; }
  .quiz-card .emoji { font-size: 30px; }
  .quiz-card h3 { font-size: 16px; }
  .quiz-title { font-size: 20px; }
  .question-text { font-size: 16px; }
  .option-btn { padding: 13px 15px; font-size: 14px; }
  .result-card { padding: 24px 18px; }
  .result-card .result-title { font-size: 24px; }
  .user-info .birth-row { gap: 5px; }
  .user-info .birth-row select { padding: 10px 5px; font-size: 13px; }
}
</style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<div class="container">
  <div class="header stagger-in stagger-1">
    <h1>✦ 趣味测试乐园 ✦</h1>
    <p class="subtitle">AI 驱动的个性化趣味测试，每次结果都不一样</p>
  </div>

  <!-- User Info -->
  <div class="user-info glass-card stagger-in stagger-2" id="userInfo">
    <div class="section-label">🔐 你的信息</div>
    <input type="text" id="userNameInput" placeholder="你的姓名（必填）">
    <div style="font-size:12px;color:var(--text-dim);margin-bottom:12px;letter-spacing:0.5px;">出生日期</div>
    <div class="birth-row">
      <select id="birthYear"></select>
      <select id="birthMonth"></select>
      <select id="birthDay"></select>
    </div>
    <button class="start-btn" onclick="confirmUserInfo()">✦ 开始测试</button>
  </div>

  <!-- Quiz List -->
  <div class="quiz-grid hidden" id="quizGrid">
    <div class="quiz-card stagger-in stagger-2" data-quiz="personality" onclick="startQuiz('personality')">
      <div class="quiz-card-top-bar"></div>
      <span class="emoji">🎭</span>
      <h3>你的隐藏人格</h3>
      <p>通过 5 个情境问题，AI 深度解读你不为人知的另一面</p>

<script>
// ========== Particle Background ==========
(function initParticles() {
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  const PARTICLE_COUNT = 60;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  class Particle {
    constructor() {
      this.reset(true);
    }
    reset(init) {
      this.x = Math.random() * canvas.width;
      this.y = init ? Math.random() * canvas.height : canvas.height + 10;
      this.size = Math.random() * 2.5 + 0.5;
      this.speedY = -(Math.random() * 0.4 + 0.15);
      this.speedX = (Math.random() - 0.5) * 0.3;
      this.opacity = Math.random() * 0.5 + 0.2;
      this.opacityDir = Math.random() > 0.5 ? 0.003 : -0.003;
      this.hue = [280, 320, 190, 40][Math.floor(Math.random() * 4)]; // purple, pink, cyan, amber
    }
    update() {
      this.y += this.speedY;
      this.x += this.speedX;
      this.opacity += this.opacityDir;
      if (this.opacity > 0.7 || this.opacity < 0.1) this.opacityDir *= -1;
      if (this.y < -10 || this.x < -10 || this.x > canvas.width + 10) {
        this.reset(false);
      }
    }
    draw(ctx) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${this.opacity})`;
      ctx.fill();
      // Glow
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${this.opacity * 0.15})`;
      ctx.fill();
    }
  }

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push(new Particle());
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(ctx); });

    // Draw connecting lines between nearby particles
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 100) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(179,71,234,${0.04 * (1 - dist / 100)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(animate);
  }
  animate();
})();

// ========== State ==========
let currentQuiz = null;
let currentStep = 0;
let questions = [];
let answers = [];
let userName = '';
let userBirthday = '';

// Init birth date selectors
(function initBirthSelectors() {
  const yearSel = document.getElementById('birthYear');
  const monthSel = document.getElementById('birthMonth');
  const daySel = document.getElementById('birthDay');

  yearSel.innerHTML = '<option value="">年</option>';
  for (let y = 2010; y >= 1950; y--) {
    yearSel.innerHTML += `<option value="${y}">${y}</option>`;
  }

  monthSel.innerHTML = '<option value="">月</option>';
  for (let m = 1; m <= 12; m++) {
    monthSel.innerHTML += `<option value="${m}">${m}</option>`;
  }

  function updateDays() {
    const y = parseInt(yearSel.value) || 2000;
    const m = parseInt(monthSel.value) || 1;
    const maxDay = new Date(y, m, 0).getDate();
    const cur = daySel.value;
    daySel.innerHTML = '<option value="">日</option>';
    for (let d = 1; d <= maxDay; d++) {
      const sel = parseInt(cur) === d ? ' selected' : '';
      daySel.innerHTML += `<option value="${d}"${sel}>${d}</option>`;
    }
  }

  yearSel.addEventListener('change', updateDays);
  monthSel.addEventListener('change', updateDays);
  updateDays();
})();

// ========== User Info ==========
function confirmUserInfo() {
  const nameInput = document.getElementById('userNameInput');
  const yearSel = document.getElementById('birthYear');
  const monthSel = document.getElementById('birthMonth');
  const daySel = document.getElementById('birthDay');

  const name = nameInput.value.trim();
  if (!name) {
    showToast('请输入你的姓名');
    nameInput.focus();
    return;
  }
  if (!yearSel.value || !monthSel.value || !daySel.value) {
    showToast('请选择完整的出生日期');
    return;
  }

  userName = name;
  userBirthday = `${yearSel.value}年${monthSel.value}月${daySel.value}日`;

  document.getElementById('userInfo').classList.add('hidden');
  document.getElementById('quizGrid').classList.remove('hidden');
  // Trigger stagger animation on quiz cards
  document.querySelectorAll('#quizGrid .quiz-card').forEach((el, i) => {
    el.classList.add('stagger-in', `stagger-${i + 2}`);
  });
  showToast(`你好，${userName}！请选择一个测试吧 ✦`);
}

// ========== Quiz Config ==========
const QUIZZES = {
  personality: {
    title: '你的隐藏人格',
    totalQuestions: 5,
    color: 'personality',
    systemPrompt: `你是一个专业而有趣的人格分析师。你需要通过5个情境问题来分析用户的隐藏人格。

规则：
1. 每次生成一个情境问题，提供4个选项（A/B/C/D）
2. 问题要有趣、有深度，不要太直白
3. 选项不要有明显的好坏之分，每个都合理
4. 基于用户之前的回答来调整后续问题的方向

请严格按以下JSON格式返回（不要返回其他内容）：
{"question":"问题内容","options":["A. 选项1","B. 选项2","C. 选项3","D. 选项4"]}`,
    resultPrompt: `根据以下5个问题和用户的回答，生成一份有趣的隐藏人格分析报告。

要求：
1. 给出一个有创意的人格标签（如"温柔的叛逆者"、"理性浪漫主义者"等）
2. 用轻松有趣的语气分析
3. 包含：核心性格特质、隐藏的一面、适合的解压方式
4. 300字左右
5. 严格按以下JSON格式返回：
{"title":"人格标签","body":"分析内容"}`
  },
  fortune: {
    title: '今日运势解读',
    totalQuestions: 4,
    color: 'fortune',
    systemPrompt: `你是一个风趣的运势解读师，风格介于星座博主和脱口秀之间。你需要通过4个关于今天状态的问题来生成运势。

规则：
1. 问题围绕用户今天的感受、遇到的事、心情等
2. 提供4个选项
3. 语气轻松有趣

请严格按以下JSON格式返回（不要返回其他内容）：
{"question":"问题内容","options":["A. 选项1","B. 选项2","C. 选项3","D. 选项4"]}`,
    resultPrompt: `根据以下问题和用户的回答，生成一份今日运势解读。

要求：
1. 给出一个有趣的运势标题（如"锦鲤附体日"、"适合躺平的一天"等）
2. 包含：整体运势、事业/学业、感情、幸运颜色和数字
3. 语气有趣不无聊，像朋友聊天
4. 250字左右
5. 严格按以下JSON格式返回：
{"title":"运势标题","body":"运势内容"}`
  },
  brainstorm: {
    title: '脑洞指数测评',
    totalQuestions: 5,
    color: 'brainstorm',
    systemPrompt: `你是一个脑洞测试出题官。你需要出5道奇葩但有趣的情境题来测试用户的想象力和创造力。

规则：
1. 问题要天马行空但有趣，比如"如果你醒来发现自己变成了一只猫"
2. 4个选项要有明显的脑洞差异，从保守到疯狂
3. 不要太幼稚，要有成年人的幽默感

请严格按以下JSON格式返回（不要返回其他内容）：
{"question":"问题内容","options":["A. 选项1","B. 选项2","C. 选项3","D. 选项4"]}`,
    resultPrompt: `根据以下问题和用户的回答，生成一份脑洞指数测评报告。

要求：
1. 给出一个脑洞指数（如 "脑洞指数: 87/100 — 平行宇宙旅行者"）
2. 分析用户的想象力类型和创造力风格
3. 给出一个有趣的"脑洞等级"称号
4. 语气幽默犀利
5. 300字左右
6. 严格按以下JSON格式返回：
{"title":"脑洞等级称号","body":"测评内容"}`
  }
};

// ========== API Call ==========
async function callAI(messages) {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      model: 'google/gemini-3.5-flash',
      messages,
      temperature: 0.9,
      max_tokens: 1000
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `API 请求失败 (${res.status})`);
  }
  const data = await res.json();
  return data.choices[0].message.content;
}

function parseJSON(text) {
  const match = text.match(/\{[\s\S]*\}/);
  if (match) {
    return JSON.parse(match[0]);
  }
  throw new Error('无法解析 AI 返回的内容');
}

// ========== Quiz Logic ==========
async function startQuiz(type) {
  currentQuiz = type;
  currentStep = 0;
  questions = [];
  answers = [];

  document.getElementById('quizGrid').classList.add('hidden');
  document.getElementById('quizFlow').classList.add('active');

  await loadQuestion();
}

async function loadQuestion() {
  const quiz = QUIZZES[currentQuiz];
  const content = document.getElementById('quizContent');

  content.innerHTML = `
    <div class="quiz-title">${quiz.title}</div>
    <div class="quiz-progress">第 ${currentStep + 1} / ${quiz.totalQuestions} 题</div>
    <div class="progress-bar"><div class="progress-fill ${quiz.color}" style="width:${(currentStep / quiz.totalQuestions) * 100}%"></div></div>
    <div class="loading">
      <div class="loading-ring"><div class="ring-core"></div></div>
      <p>AI 正在出题...</p>
    </div>
  `;

  try {
    const userContext = `用户信息：姓名：${userName}，出生日期：${userBirthday}。请在出题时适当融入用户的个人信息，让题目更有针对性和亲切感。`;
    const messages = [{ role: 'system', content: userContext + '\n\n' + quiz.systemPrompt }];

    if (questions.length > 0) {
      let context = '之前的问答记录：\n';
      questions.forEach((q, i) => {
        context += `第${i+1}题：${q.question}\n用户选择：${answers[i]}\n\n`;
      });
      context += `请生成第${currentStep + 1}题。`;
      messages.push({ role: 'user', content: context });
    } else {
      messages.push({ role: 'user', content: '请生成第1题。' });
    }

    const response = await callAI(messages);
    const data = parseJSON(response);

    questions.push(data);
    renderQuestion(data);
  } catch (err) {
    content.innerHTML = `
      <div class="quiz-title">${quiz.title}</div>
      <div class="error-msg">出题失败：${err.message}</div>
      <button class="option-btn" onclick="loadQuestion()">重试</button>
    `;
  }
}

function renderQuestion(data) {
  const quiz = QUIZZES[currentQuiz];
  const content = document.getElementById('quizContent');

  content.innerHTML = `
    <div class="quiz-title">${quiz.title}</div>
    <div class="quiz-progress">第 ${currentStep + 1} / ${quiz.totalQuestions} 题</div>
    <div class="progress-bar"><div class="progress-fill ${quiz.color}" style="width:${((currentStep + 1) / quiz.totalQuestions) * 100}%"></div></div>
    <div class="question-text">${data.question}</div>
    <div class="options">
      ${data.options.map((opt, i) =>
        `<button class="option-btn" onclick="selectAnswer(${i}, this)">${opt}</button>`
      ).join('')}
    </div>
  `;
}

async function selectAnswer(index, btnEl) {
  const quiz = QUIZZES[currentQuiz];
  answers.push(questions[currentStep].options[index]);

  // Bounce animation on selected option
  if (btnEl) {
    btnEl.classList.add('bounce-select');
    await new Promise(r => setTimeout(r, 400));
  }

  currentStep++;

  if (currentStep >= quiz.totalQuestions) {
    await generateResult();
  } else {
    await loadQuestion();
  }
}

async function generateResult() {
  const quiz = QUIZZES[currentQuiz];
  const content = document.getElementById('quizContent');

  const loadingTexts = [
    'AI 正在深度分析你的回答...',
    '正在生成专属报告...',
    '即将揭晓结果...'
  ];
  let loadIdx = 0;

  content.innerHTML = `
    <div class="quiz-title">${quiz.title}</div>
    <div class="progress-bar"><div class="progress-fill ${quiz.color}" style="width:100%"></div></div>
    <div class="loading">
      <div class="loading-ring"><div class="ring-core"></div></div>
      <p id="loadingText">${loadingTexts[0]}</p>
      <p class="loading-sub">通常需要 5-10 秒</p>
    </div>
  `;

  const loadingTimer = setInterval(() => {
    loadIdx = (loadIdx + 1) % loadingTexts.length;
    const el = document.getElementById('loadingText');
    if (el) el.textContent = loadingTexts[loadIdx];
  }, 2500);

  try {
    let qaRecord = '';
    questions.forEach((q, i) => {
      qaRecord += `第${i+1}题：${q.question}\n用户选择：${answers[i]}\n\n`;
    });

    const userContext = `用户信息：姓名：${userName}，出生日期：${userBirthday}。请在生成结果时称呼用户的名字，并结合出生日期给出更个性化的分析。`;
    const messages = [
      { role: 'system', content: userContext + '\n\n' + quiz.resultPrompt },
      { role: 'user', content: qaRecord }
    ];

    const response = await callAI(messages);
    const data = parseJSON(response);
    clearInterval(loadingTimer);
    renderResult(data);
  } catch (err) {
    clearInterval(loadingTimer);
    content.innerHTML = `
      <div class="quiz-title">${quiz.title}</div>
      <div class="error-msg">生成结果失败：${err.message}</div>
      <button class="option-btn" onclick="generateResult()">重试</button>
    `;
  }
}

function renderResult(data) {
  const quiz = QUIZZES[currentQuiz];
  const content = document.getElementById('quizContent');

  content.innerHTML = `
    <div class="result-card ${quiz.color}">
      <div class="result-user">👤 ${userName} 的测试结果</div>
      <div class="result-label">${quiz.title} · 测试结果</div>
      <div class="result-title">${data.title}</div>
      <div class="result-body">${data.body}</div>
      <div class="result-actions">
        <button class="btn-retry" onclick="startQuiz('${currentQuiz}')">再测一次</button>
        <button class="btn-share" onclick="shareResult()">复制结果</button>
      </div>
    </div>
  `;
}

// ========== Navigation ==========
function backToHome() {
  document.getElementById('quizFlow').classList.remove('active');
  document.getElementById('quizGrid').classList.remove('hidden');
  document.getElementById('userInfo').classList.remove('hidden');
  currentQuiz = null;
}

// ========== Share ==========
function shareResult() {
  const title = document.querySelector('.result-title')?.textContent || '';
  const body = document.querySelector('.result-body')?.textContent || '';
  const quiz = QUIZZES[currentQuiz];
  const text = `【${quiz.title}】\n${userName} 的结果：${title}\n\n${body}\n\n—— 来自趣味测试乐园`;

  navigator.clipboard.writeText(text).then(() => {
    showToast('已复制到剪贴板，去分享吧！');
  }).catch(() => {
    showToast('复制失败，请手动复制');
  });
}

// ========== Toast ==========
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}
</script>
